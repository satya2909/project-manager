<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Camp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // First-paint theme — set data-theme BEFORE React mounts so there is no
      // dark→light flash. saved preference → system preference → dark default.
      (function () {
        try {
          var saved = localStorage.getItem("pc-theme");
          var system = window.matchMedia("(prefers-color-scheme: light)").matches
            ? "light"
            : "dark";
          var theme = saved || system;
          if (theme === "light")
            document.documentElement.setAttribute("data-theme", "light");
        } catch (e) {
          /* storage/matchMedia unavailable — fall through to dark default */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
